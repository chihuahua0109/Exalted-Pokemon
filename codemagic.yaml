# Codemagic CI/CD — Kairos Pokemon → TestFlight (free individual plan).
#
# Env vars in the "kairos" group in Codemagic (all marked Secure):
#   APP_STORE_CONNECT_ISSUER_ID      — Issuer ID from App Store Connect
#   APP_STORE_CONNECT_KEY_IDENTIFIER — Key ID of the .p8 API key
#   APP_STORE_CONNECT_PRIVATE_KEY    — full contents of the .p8 API key file
#   CERTIFICATE_PRIVATE_KEY          — RSA private key that backs the iOS
#                                      Distribution certificate (kairos_cert_key.pem)
#
# The App Store Connect API auth is read from those env vars automatically by
# the codemagic-cli-tools. The certificate key lets the build create/reuse the
# distribution certificate itself — no Xcode cloud signing, no Admin key needed.

workflows:
  ios-testflight:
    name: Kairos Pokemon - iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - kairos
      vars:
        BUNDLE_ID: "com.kairos.pokemon"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APP_ID: "6790096844"
      node: 20.12.2
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm ci || npm install

      - name: Generate iOS project & sync web assets
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios

      - name: Add permission strings to Info.plist
        script: |
          PLIST="ios/App/App/Info.plist"
          CAM="Scan your Pokemon cards to identify them and look up prices."
          PHOTO="Upload a photo of a card to identify it."
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string \"$CAM\"" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription \"$CAM\"" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string \"$PHOTO\"" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription \"$PHOTO\"" "$PLIST"

      - name: Fetch or create signing certificate & profile
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Auto-increment build number
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" 2>/dev/null || echo 0)
          cd ios/App
          agvtool new-version -all $((LATEST + 1))

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
