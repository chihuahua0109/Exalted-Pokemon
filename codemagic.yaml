# Codemagic CI/CD — builds the iOS app on a cloud Mac and ships it to TestFlight.
# Works on the free individual plan using environment variables for code signing.
# Required env vars in the "kairos" group:
#   APP_STORE_CONNECT_ISSUER_ID   — Issuer ID from App Store Connect
#   APP_STORE_CONNECT_KEY_ID      — Key ID (e.g. 538TGDU6JD)
#   APP_STORE_CONNECT_PRIVATE_KEY — full contents of your .p8 file

workflows:
  ios-testflight:
    name: Kairos Pokemon - iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - kairos
      vars:
        BUNDLE_ID: "com.kairos.pokemon"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APP_ID: "6790096844"
      node: 20.12.2
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm ci || npm install

      - name: Generate iOS project & sync web assets
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios

      - name: Add camera & photo permission strings to Info.plist
        script: |
          PLIST="ios/App/App/Info.plist"
          CAM="Scan your Pokemon cards to identify them and look up prices."
          PHOTO="Upload a photo of a card to identify it."
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string \"$CAM\"" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription \"$CAM\"" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string \"$PHOTO\"" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription \"$PHOTO\"" "$PLIST"

      - name: Set up code signing
        script: |
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/AuthKey.p8
          chmod 600 /tmp/AuthKey.p8

          # Fetch (or create) the App Store distribution profile for this bundle ID.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --private-key @file:/tmp/AuthKey.p8 \
            --create

          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Auto-increment build number
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --private-key @file:/tmp/AuthKey.p8 \
            2>/dev/null || echo 0)
          cd ios/App
          agvtool new-version -all $((LATEST + 1))

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
