# Codemagic CI/CD — builds the iOS app on a cloud Mac and ships it to TestFlight.
# No local Mac required. See the "Ship to iOS (TestFlight)" section of README.md
# for the one-time setup (App Store Connect API key + app record).
#
# Before your first run, fill in APP_STORE_APP_ID and (optionally) BUNDLE_ID
# below, and add an "App Store Connect" integration in Codemagic named exactly
# the group referenced under environment.groups.

workflows:
  ios-testflight:
    name: Kairos Pokemon - iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: KairosASC # <- name of your App Store Connect integration in Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kairos.pokemon
      vars:
        BUNDLE_ID: "com.kairos.pokemon"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        # Numeric Apple ID of the app record in App Store Connect (App Information
        # > General > Apple ID). Needed to auto-increment the build number.
        APP_STORE_APP_ID: "0000000000"
      node: 20.12.2
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm ci || npm install
      - name: Generate iOS project (first build) & sync web assets
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios
      - name: Add camera & photo permission strings to Info.plist
        script: |
          PLIST="ios/App/App/Info.plist"
          CAM="Scan your Pokemon cards to identify them and look up prices."
          PHOTO="Upload a photo of a card to identify it."
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string \"$CAM\"" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription \"$CAM\"" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string \"$PHOTO\"" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription \"$PHOTO\"" "$PLIST"
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Auto-increment build number
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" 2>/dev/null || echo 0)
          cd ios/App
          agvtool new-version -all $((LATEST + 1))
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
