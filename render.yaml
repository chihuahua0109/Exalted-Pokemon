# Render.com deployment blueprint for the Kairos Pokemon backend (FREE tier).
# Deploy: push this repo to GitHub, then in Render: New > Blueprint > pick repo.
#
# NOTE ON DATA PERSISTENCE:
# The free plan has an EPHEMERAL filesystem — user accounts and inventory are
# reset on every redeploy and whenever the instance spins down (after ~15 min
# of inactivity). Great for testing the app + TestFlight build; not for keeping
# real logins.
#
# To make data persist, either:
#   (a) upgrade to a paid instance and add a disk (see the commented block), or
#   (b) ask to switch storage to a free database (e.g. MongoDB Atlas, no card).
services:
  - type: web
    # NOTE: the already-deployed service still uses the old name; rename it in
    # the Render dashboard (Settings > Name) to match. New deploys use this name.
    name: kairos-pokemon
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      # Set this in the Render dashboard (your OCR.space key) — keep it secret.
      - key: OCRSPACE_API_KEY
        sync: false
      # MongoDB Atlas connection string (free tier). With this set, accounts,
      # logins, and collections persist across restarts and sync across devices.
      - key: MONGODB_URI
        sync: false
# --- To persist data on a PAID instance, change plan above to "starter" and
# --- uncomment the lines below:
#     envVars:
#       - key: DATA_DIR
#         value: /data
#     disk:
#       name: kairos-data
#       mountPath: /data
#       sizeGB: 1
